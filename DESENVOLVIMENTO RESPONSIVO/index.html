<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Responsivo com Bootstrap</title>

    <!-- Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="container-fluid bg-dark text-white text-center p-4">
        <h1>Site Responsivo</h1>
    </header>

    <!-- Main -->
    <main class="container my-4">
        <div class="row">

            <!-- Coluna 1 -->
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-primary text-white p-3 shadow rounded text-center">
                    <h3>Coluna 1</h3>
                    <p>Conteúdo da primeira coluna utilizando Bootstrap Grid.</p>
                </div>
            </div>

            <!-- Coluna 2 -->
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-success text-white p-3 shadow rounded text-center">
                    <h3>Coluna 2</h3>
                    <p>Conteúdo da segunda coluna com responsividade aplicada.</p>
                </div>
            </div>

            <!-- Coluna 3 -->
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-warning text-dark p-3 shadow rounded text-center">
                    <h3>Coluna 3</h3>
                    <p>Conteúdo da terceira coluna adaptável a diferentes telas.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="container-fluid bg-light text-center p-3 mt-4 border-top">
        <p class="mb-0">Desenvolvido com Bootstrap 5</p>
    </footer>

    <!-- Bootstrap 5 JavaScript Bundle com Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
